<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background -->
  <rect width="400" height="500" fill="#fffaf0"/>
  
  <!-- Border -->
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="#c41e5f" stroke-width="3" rx="5"/>
  
  <!-- Decorative hearts -->
  <text x="50" y="60" font-size="40" fill="#e85b8a">❤️</text>
  <text x="330" y="60" font-size="40" fill="#e85b8a">❤️</text>
  
  <!-- Title -->
  <text x="200" y="90" font-size="24" font-weight="bold" text-anchor="middle" fill="#c41e5f" font-family="Georgia">A Love Letter</text>
  
  <!-- Letter lines -->
  <line x1="50" y1="120" x2="350" y2="120" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="150" x2="350" y2="150" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="180" x2="350" y2="180" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="210" x2="350" y2="210" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="240" x2="350" y2="240" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="270" x2="350" y2="270" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="300" x2="350" y2="300" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="330" x2="350" y2="330" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="360" x2="350" y2="360" stroke="#e85b8a" stroke-width="1" opacity="0.5"/>
  
  <!-- Text content -->
  <text x="80" y="145" font-size="14" fill="#c41e5f" font-family="Georgia">Dear Marien,</text>
  
  <text x="80" y="175" font-size="12" fill="#666" font-family="Georgia" opacity="0.8">Your love means everything...</text>
  <text x="80" y="205" font-size="12" fill="#666" font-family="Georgia" opacity="0.8">Replace with your personal letter</text>
  <text x="80" y="235" font-size="12" fill="#666" font-family="Georgia" opacity="0.8">or upload your love letter photo</text>
  <text x="80" y="265" font-size="12" fill="#666" font-family="Georgia" opacity="0.8">in the assets/images folder</text>
  
  <!-- Signature area -->
  <text x="80" y="385" font-size="14" fill="#c41e5f" font-family="Georgia" font-style="italic">With all my love,</text>
  <text x="80" y="415" font-size="12" fill="#c41e5f" font-family="Georgia">Your Name</text>
  
  <!-- Decorative bottom hearts -->
  <text x="50" y="460" font-size="35" fill="#e85b8a">❤️</text>
  <text x="330" y="460" font-size="35" fill="#e85b8a">❤️</text>
</svg>
